name: Deploy to Production S3

on: workflow_dispatch

jobs:
  deploy-production:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_V2 }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_V2 }}
          aws-region: ${{ secrets.AWS_REGION_V2 }}

      - name: Push to S3
        run: aws s3 sync . s3://holy-india-travel/ --delete --acl public-read --exclude ".git/"
